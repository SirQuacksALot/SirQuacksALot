name: HTB Profile
on:
  schedule: [{cron: "0 */6 * * *"}]
  workflow_dispatch:
jobs:
  fetch-htb-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch HTB profile
        run: |
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.HTB_API_TOKEN }}" \
            -H "Accept: application/json" \
            https://labs.hackthebox.com/api/v4/user/profile/basic/1613228)
          echo "HTTP status: $HTTP_STATUS"
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] || { cat response.json; exit 1; }
          jq '{profile: {name: .profile.name, rank: .profile.rank, points: .profile.points}}' response.json > htb.profile.json
          rm response.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add htb.profile.json
          git diff --staged --quiet || git commit -m "Update HTB profile data - [Skip GitHub Action]"
          git push
